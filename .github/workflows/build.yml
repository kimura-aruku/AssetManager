name: Build and test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AssetManager.sln

      - name: Build
        run: dotnet build AssetManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AssetManager.sln --configuration Release --no-build --no-restore
